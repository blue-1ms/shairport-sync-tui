<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">shairport-tui main screen demo</title>
  <desc id="desc">A terminal-style demo showing the cleaner main playback screen with controls in the footer.</desc>
  <rect width="980" height="430" fill="#101418"/>
  <rect x="24" y="24" width="932" height="382" rx="10" fill="#151b22" stroke="#2b3642"/>
  <text x="48" y="58" fill="#7dd3fc" font-family="monospace" font-size="20" font-weight="700">Shairport Sync</text>
  <text x="742" y="58" fill="#9ca3af" font-family="monospace" font-size="16">2026-06-15 09:30:00</text>
  <line x1="48" y1="82" x2="932" y2="82" stroke="#344151"/>
  <text x="48" y="122" fill="#86efac" font-family="monospace" font-size="18" font-weight="700">Connected</text>
  <text x="190" y="122" fill="#cbd5e1" font-family="monospace" font-size="16">Client: 192.168.1.23 (iphone.local)</text>
  <text x="704" y="122" fill="#cbd5e1" font-family="monospace" font-size="16">Vol: -16.2 dB (46%)</text>
  <text x="48" y="170" fill="#7dd3fc" font-family="monospace" font-size="19" font-weight="700">Now Playing</text>
  <text x="72" y="214" fill="#f8fafc" font-family="monospace" font-size="30" font-weight="700">Smile</text>
  <text x="72" y="250" fill="#7dd3fc" font-family="monospace" font-size="22" font-weight="700">Jay Chou &amp; Cindy Yen</text>
  <text x="72" y="282" fill="#9ca3af" font-family="monospace" font-size="16">Opus 12 | Mandopop</text>
  <text x="72" y="318" fill="#9ca3af" font-family="monospace" font-size="16">2:24 / 4:49 estimated</text>
  <rect x="72" y="336" width="820" height="20" rx="4" fill="#263241"/>
  <rect x="72" y="336" width="410" height="20" rx="4" fill="#7dd3fc"/>
  <text x="48" y="388" fill="#9ca3af" font-family="monospace" font-size="15">Space Play/Pause  n Next  p Prev  +/- Vol  d Debug  ? Help  q Quit</text>
</svg>
